# ============================================================
# Au+REE Pipeline — NE Washington Study Area Configuration
# ============================================================
# All paths are relative to the repo root.
# Run:  python pipeline/run_pipeline.py --config configs/ne_washington/config.yaml

study_area:
  name: "NE Washington"
  short: "ne_wa"
  bbox:
    lon_min: -120.0
    lon_max: -117.0
    lat_min: 47.5
    lat_max: 49.1
  map_padding: 0.08   # degrees of padding added to bbox for all map panels
  # Tighter bbox used for WGS site filtering
  wgs_bbox:
    lon_min: -120.0
    lon_max: -117.5
    lat_min: 47.5
    lat_max: 49.1
  crs: "EPSG:4326"

outputs_dir: "ne_wa_ree/outputs"

# ── Data file locations ───────────────────────────────────────────────────────
data:
  nure_csv: "data/nure/nure_ne_wa_sediment.csv"
  mrds_geojson: "ne_wa_ree/data/mrds/mrds_ne_wa.geojson"
  geology_geojson: null        # ne_wa_ree/data/geologic/wa_geology.geojson (optional)
  aeromagnetic_tif: null       # ne_wa_ree/data/aeromagnetic/wa_mag_anomaly.tif (optional)
  dem_tif: "ne_wa_ree/data/dem/ne_wa_dem_30m.tif"  # Copernicus GLO-30, 8 tiles mosaicked, covers lon -120→-116 / lat 47→49
  wgs_excel: data/wgs_ofr2026/ger_ofr2026-02_data_supplement.xlsx

# ── MRDS commodity filter ─────────────────────────────────────────────────────
mrds_commodities: ["placer gold", "gold", "REE", "monazite", "magnetite"]

# ── ML targeting (Task 9) ─────────────────────────────────────────────────────
# mrds_proximity_deg: catchment-scale radius (~15 km = one drainage basin).
#   0.03° (old default) was point-proximity only; 45% recall loss vs. 0.15°.
# mrds_commodity_filter: train on MRDS sites for one deposit type at a time.
#   'placer_gold' — Gold target_commodity only (1623 NE WA sites)
#   'ree'         — Rare Earth Elements target_commodity (7 sites; sparse)
#   'cu_mo'       — sites with CU or MO in code_list (~300+ sites)
#   'all'         — no filter, blended model (legacy behaviour)
ml:
  mrds_proximity_deg: 0.15
  mrds_commodity_filter: "placer_gold"
  mrds_elev_diff_m: 200
  anomaly_top_pct: 0.10

