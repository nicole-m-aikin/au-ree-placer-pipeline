# ── Geochemistry parameters ───────────────────────────────────────────────────
geochemistry:
  regional_bg_th: 8.0               # ppm — NE WA NURE median background
  # Monazite classification criteria (Mücke & Bhaskara Rao 1996; Rasmussen & Muhling 2009)
  # Ce/La thresholds set to 75th-percentile of this NURE dataset (NE WA has elevated REE
  # background from Colville Batholith; using crustal averages would flag half all samples).
  monazite_ce_min_ppm: 95   # 75th pctile NE WA NURE (was 50 — below dataset median of 82)
  monazite_la_min_ppm: 70   # 75th pctile NE WA NURE (was 20 — below dataset median of 50)
  monazite_p_min_ppm: 500   # Plant et al. 1999 phosphate-enriched threshold (was 400 — within background)
  monazite_uth_max: 0.5     # Heaman & Parrish 1991; Förster 2006 — unchanged, literature-standard
  thorite_uth_min: 1.5      # Mücke & Rao 1996 — unchanged; gap 0.5-1.5 = xenotime/mixed zone
  # Xenotime (YPO4) classification — HREE proxy, independent of LREE/monazite signal
  xenotime_y_min_ppm: 82    # mean+2SD of NE WA NURE Y distribution (computed in task1)
  # Volume/grade conversion factors (task4)
  bulk_density_t_m3: 1.5            # t/m³ — loose gravel tailings
  th_in_monazite_frac: 0.044        # Cheney et al. 1994 — NE WA metamorphic monazite
  lree_in_monazite: 0.28            # mass fraction total LREE (Gramaccioli 2002)
  ndpr_in_monazite: 0.09            # mass fraction NdPr (Smith et al. 2015)
  y_in_xenotime: 0.38               # mass fraction Y in YPO4 (stoichiometric, Förster 2006)
  stream_to_insitu_factor: 5.0      # dilution factor (Bonham-Carter et al. 1988)

# ── Economics (task5) ─────────────────────────────────────────────────────────
economics:
  processor_name: "Energy Fuels White Mesa Mill"
  processor_location: "Blanding, UT"
  ndpr_price_central: 109.0         # $/kg NdPr oxide (SMM benchmark, June 2026)
  ndpr_price_low: 60.0              # $/kg (2024 trough)
  ndpr_price_high: 140.0            # $/kg (Q1 2026 peak)
  y2o3_price_central: 3.50          # $/kg Y₂O₃ (Asian Metal benchmark, June 2026)
  y2o3_price_low: 2.50              # $/kg (2024 trough)
  y2o3_price_high: 5.50             # $/kg (2022 peak)
  tailings_handling_cost: 5.0       # $/tonne tailings
  concentration_cost: 10.0          # $/tonne tailings feed
  logistics_conc_per_tonne: 150.0   # $/tonne concentrate to White Mesa
  processing_cost_per_kg: 50.0      # $/kg NdPr oxide produced
  ndpr_recovery: 0.80               # mass recovery fraction
  y2o3_recovery: 0.75               # xenotime recovery (slightly lower — coarser grain than monazite)

# ── Integration scoring weights (integration_task) ────────────────────────────
scoring:
  weights:
    th_source: 1.0
    mag_high: 1.0
    source_lith: 1.0
    confidence: 1.0
    ndpr_tonnes: 2.0
    au_pathfinder: 1.0
    y_xenotime: 0.5          # HREE co-product indicator — Y₂O₃ ~$3.50/kg vs NdPr $109/kg
    ml_probability: 1.0      # RF P(anomalous) of nearest NURE sample within 0.15°
  tier_thresholds: [8, 6, 4]   # [highest, high, moderate] thresholds for tier_color()

